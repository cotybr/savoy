<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2596be">
    <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <title>Solicitação de requisições</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- -----------------------     Banner de Instalação do PWA      --------------------------->

    <div id="pwa-install-banner">
        <p>Instale o App para solicitar as Requisições mais
            rápido!</p>
        <div>
            <br>
            <button id="btn-instalar-pwa">Instalar
                Agora</button><br>
            <button onclick="document.getElementById('pwa-install-banner').style.display='none'">Depois</button><br>
        </div>
    </div>

    <!-- -----------------------     Login      --------------------------->

    <div id="login-container" class="secao" style="display: none;">
        <div>
            <h2>Acesso Restrito </h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">
            <button type="button" onclick="login()">Entrar</button>
            <p id="login-erro" style="display: none;">Acesso negado.</p>
        </div>
    </div>


    <!-- -----------------------     Loader      --------------------------->

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- -----------------------     Menu Superior      --------------------------->

    <div id="menuToggle">
        <input type="checkbox" id="menuCheckbox" />
        <label for="menuCheckbox" onclick="window.location.href='index.html'" onselect="secao('login-conteiner')"><span class="logo">S</span>AVOY</label>
    </div>


    <!-----------------------     Menu Inferior      --------------------------->

    <div class="navbar-bottom">
        <span onclick="secao('requisicoes')" class="button-bottom" id="requisicao"></span>
        <span onclick="secao('bancoHoras')" class="button-bottom" id="bancodehoras"></span>
        <span onclick="secao('velocidad')" class="button-bottom" id="velocidade"></span>
        <span onclick="secao('program')" class="button-bottom" id="programacao"></span>

    </div>

    <!-----------------------     Banco de Horas      --------------------------->

    <div id="bancoHoras" class="secao" style="display: none">
        <input type="text" onfocus="this.value='';" id="buscaColaborador"
            placeholder="Digite parte do nome ou matrícula"
            oninput="sugerirColaboradorUnificado('buscaColaborador', 'sugestoesBancoHoras')">
        <div id="sugestoesBancoHoras" class="sugestoes"></div>
        <button onclick="buscarBancoHoras()">Buscar</button>
        <div id="versao"></div>
        <div id="resultado" class="resultado"></div>
    </div>


    <!-----------------------   Requisições   -------------------------->
    <div class="secao" id="requisicoes" style="margin-bottom: 12rem; display: flex;"
        onload="carregarRequisicoesColaborador()">




        <div id="resultadoBusca"></div>


        <input type="text" onfocus="this.value='';" id="buscaRequisicao"
            placeholder="Ex: Nome,Matricula (Fulano,111111)"
            oninput="sugerirColaboradorUnificado('buscaRequisicao', 'sugestoesColaborador')">
        <div id="sugestoesColaborador" class="sugestoes"></div>

        <div class="qtd_desc" style="display: none;">
            <input type="number" id="quantidade" onfocus="this.value='';" class="quantidade" placeholder="Quantidade"
                min="1" value="1">
            <select id="descricao" name="descricao" class="descricao">
                <option value="TROCA/DESGASTE NATURAL" class="desc">Troca/Desgaste Natural</option>
                <option value="NECESSIDADE" class="desc necessidade">Necessidade</option>
                <option value="PERDA" class="desc perda">Perda</option>
                <option value="USO COLETIVO" class="desc coletivo">Uso Coletivo</option>
            </select>
        </div>
        <input type="text" placeholder="Digite o nome do EPI" id="epiInput" oninput="sugerirEPIs()">
        <div id="sugestoesEPI" class="sugestoes"></div>

        <ul id="itensRequisicao"></ul>
        <button onclick="criarRequisicao()">Criar Requisição</button>
        <div id="listaRequisicoes"></div>
    </div>

    <!-----------------------     Velocidade      -------------------------->

    <div class="secao" id="velocidad" style="display: none;">

        <div class="soon"></div>
    </div>



    <!-----------------------     Programação       ---------------------->


    <div class="secao" id="program" style="display: none;">

        <div class="soon"></div>
    </div>




    <!------------------------    Treinamentos     ------------------------>
    <section id="treinamentos" style="display: none;"></section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/svg.js"></script>
    <script src="assets/js/pwa-install.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/supabase.js"></script>



</body>

</html>
